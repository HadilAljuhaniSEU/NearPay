kind = "video"
previewPath = "/video-ar-v2/"
title = "NearPay — الفيديو العربي الكامل"
version = "1.0.0"
id = "artifacts/video-ar-v2"
router = "path"

[[services]]
name = "web"
paths = [ "/video-ar-v2/" ]
localPort = 20903

[services.development]
run = "pnpm --filter @workspace/video-ar-v2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-ar-v2", "run", "build" ]
serve = "static"
publicDir = "artifacts/video-ar-v2/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20903"
BASE_PATH = "/video-ar-v2/"
