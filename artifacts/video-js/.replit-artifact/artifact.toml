kind = "video"
previewPath = "/video-js/"
title = "NearPay Demo Video"
version = "1.0.0"
id = "artifacts/video-js"
router = "path"

[[services]]
name = "web"
paths = [ "/video-js/" ]
localPort = 21426

[services.development]
run = "pnpm --filter @workspace/video-js run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/video-js", "run", "build" ]
serve = "static"
publicDir = "artifacts/video-js/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21426"
BASE_PATH = "/video-js/"
